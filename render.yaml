services:
  - type: web
    name: celomind-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    # --include=dev so the bundler (esbuild, pulled in via devDeps) is installed
    # even with NODE_ENV=production; build needs it, runtime does not.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: HOST
        value: 0.0.0.0
      - key: CELO_NETWORK
        value: celo
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_FAST
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_SMART
        value: llama-3.3-70b-versatile
      - key: COHERE_API_KEY
        sync: false
      - key: COHERE_MODEL
        value: command-a-03-2025
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: BLOCKSCOUT_API_KEY
        sync: false
      - key: DUNE_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: CELO_RPC_URL
        sync: false
      - key: CELO_TESTNET_RPC_URL
        sync: false
      - key: CELO_MAINNET_RPC_URL
        sync: false
      - key: MARKET_NETWORK
        sync: false
