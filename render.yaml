services:
  - type: web
    name: celomind-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CELO_NETWORK
        value: celo
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DATABASE_URL
        sync: false
      - key: BLOCKSCOUT_API_KEY
        sync: false
      - key: DUNE_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: CELO_RPC_URL
        sync: false
      - key: CELO_TESTNET_RPC_URL
        sync: false
      - key: CELO_MAINNET_RPC_URL
        sync: false
      - key: MARKET_NETWORK
        sync: false
